<div class="container">

  <div class="header">
    <h1>🚀 Task Manager Pro</h1>
    <p>Angular CRUD Project (Industry Style)</p>
  </div>

  <div class="input-box">
    <input
      type="text"
      placeholder="Enter new task..."
      [(ngModel)]="newTask"
    />

    <button (click)="addTask()">Add Task</button>
  </div>

  <div class="task-list">

    <div class="task" *ngFor="let task of tasks">

      <div class="task-left">
        <input type="checkbox" (click)="toggleTask(task.id)" />
        <span [class.done]="task.completed">
          {{ task.title }}
        </span>
      </div>

      <button class="delete" (click)="deleteTask(task.id)">
        Delete
      </button>

    </div>

  </div>

</div>
