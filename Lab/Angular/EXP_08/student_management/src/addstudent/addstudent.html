<div class="card">
  <h2>Add Student</h2>
  <form (submit)="addStudent(nameInput, ageInput); $event.preventDefault()">
    <label>
      Name
      <input #nameInput type="text" placeholder="Enter name" required />
    </label>
    <label>
      Age
      <input #ageInput type="number" min="1" placeholder="Enter age" required />
    </label>
    <button type="submit">Add to List</button>
  </form>
</div>
