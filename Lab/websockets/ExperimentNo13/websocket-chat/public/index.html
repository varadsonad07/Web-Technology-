<!DOCTYPE html>
<html>

<head>

    <title>Real-Time Chat App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h2>💬 Real-Time Chat App</h2>

        <div id="chatBox"></div>

        <div class="input-area">

            <input type="text"
                   id="message"
                   placeholder="Type your message...">

            <button onclick="sendMessage()">
                Send

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
